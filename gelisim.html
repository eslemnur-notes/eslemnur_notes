<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlim ve İbadet Takibi | Eslem Nur Çetin</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* RENK PALETİ (Light Mode Varsayılan) */
        :root {
            --primary-color: #B76E79;
            --secondary-color: #FDF5E6;
            --button-bg: #D4A5A5;
            --button-hover: #C58F8F;
            --accent-color: #9E7F7F;
            --bg-color: #FFF9F9;
            --card-bg: #FFFFFF;
            --text-color: #4E342E;
            --text-light: #8D6E63;
            --border-color: #F0E6E6;
            --note-bg: #FFF0F5;
            --soft-shadow: 0 4px 15px rgba(183, 110, 121, 0.15);
            
            /* İkon Stilleri */
            --icon-color: #B76E79;
        }

        /* DARK MODE RENK PALETİ */
        [data-theme="dark"] {
            --primary-color: #E08E98; /* Biraz daha açık pembe */
            --secondary-color: #2D2D2D;
            --button-bg: #A07070;
            --button-hover: #805050;
            --accent-color: #C0A0A0;
            --bg-color: #1A1A1A; /* Koyu arka plan */
            --card-bg: #252525; /* Kartlar */
            --text-color: #EAEAEA; /* Açık metin */
            --text-light: #B0B0B0; /* Soluk metin */
            --border-color: #444444;
            --note-bg: #333333;
            --soft-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            --icon-color: #E59CA8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: var(--soft-shadow);
            border: 1px solid var(--border-color);
            position: relative;
        }

        /* --- AYARLAR BUTONU VE MENÜ --- */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--note-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--primary-color);
            font-size: 1.2rem;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .settings-btn:hover {
            transform: rotate(45deg);
            background: var(--primary-color);
            color: white;
        }

        .settings-menu {
            position: absolute;
            top: 75px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 15px;
            box-shadow: var(--soft-shadow);
            display: none; /* Başlangıçta gizli */
            z-index: 99;
            width: 200px;
            text-align: center;
        }

        .settings-menu.active {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
        }
        
        .theme-toggle:hover {
            background: var(--note-bg);
        }

        /* Header & Başlıklar */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px; /* Ayarlar butonuyla çakışmasın */
        }

        .basmala {
            font-family: 'Scheherazade New', serif;
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            direction: rtl;
            font-weight: 700;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 300;
        }

        /* İstatistik Paneli */
        .stats-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: var(--note-bg);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .stat-box {
            text-align: center;
        }

        .stat-val {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 400;
        }

        /* Seviye Kartı */
        .level-container {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--card-bg) 100%);
            border: 2px solid var(--button-bg);
            border-radius: 20px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .level-container::before {
            content: '✿';
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 5rem;
            color: rgba(183, 110, 121, 0.1);
            transform: rotate(15deg);
        }

        .level-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1;
        }

        .level-title {
            font-family: 'Scheherazade New', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-color);
            margin-top: 5px;
            text-transform: none;
        }

        .level-progress {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 10px;
            font-style: italic;
        }

        /* Ekleme Alanı */
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        select {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            font-family: 'Lato', sans-serif;
            font-size: 1rem;
            color: var(--text-color);
            background: var(--bg-color);
            outline: none;
            transition: all 0.3s;
        }

        select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(183, 110, 121, 0.1);
        }

        .add-btn {
            padding: 15px 30px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 15px;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(183, 110, 121, 0.3);
        }

        .add-btn:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
        }

        /* Liste Alanı */
        .task-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Scrollbar Tasarımı */
        .task-list::-webkit-scrollbar {
            width: 6px;
        }
        .task-list::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        .task-list::-webkit-scrollbar-thumb {
            background: var(--button-bg);
            border-radius: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 18px 20px;
            border-radius: 15px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
        }

        .task-item:hover {
            transform: translateX(5px);
            box-shadow: var(--soft-shadow);
            border-color: var(--button-bg);
        }

        .task-item.completed {
            opacity: 0.7;
            background: var(--note-bg);
            border-left: 5px solid var(--accent-color);
        }

        .task-item:not(.completed) {
            border-left: 5px solid var(--primary-color);
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-color);
            margin-bottom: 4px;
        }

        .task-meta {
            font-size: 0.85rem;
            color: var(--text-light);
            display: flex;
            gap: 10px;
        }

        .task-points {
            background: var(--note-bg);
            color: var(--primary-color);
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-check, .btn-delete {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 1.1rem;
        }

        .btn-check {
            background: var(--secondary-color);
            color: var(--primary-color);
            border: 1px solid var(--button-bg);
        }

        .btn-check:hover {
            background: var(--primary-color);
            color: white;
        }

        .btn-delete {
            background: transparent;
            color: var(--accent-color);
            opacity: 0.6;
        }

        .btn-delete:hover {
            opacity: 1;
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 25px; }
            .settings-btn { width: 40px; height: 40px; top: 15px; right: 15px; }
            .settings-menu { top: 65px; right: 15px; width: 180px; }
            .input-group { flex-direction: column; }
            .add-btn { width: 100%; }
            h1 { font-size: 1.8rem; }
            .stats-panel { grid-template-columns: 1fr; gap: 15px; }
        }
      
      a {
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }
      
      .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: var(--primary-color);
            font-weight: 600;
            font-family: 'Playfair Display', serif;
        }

       .back-link:hover {
            text-decoration: underline;
      }
      

    </style>
</head>
<body>

<div class="container">
    <a href="index.html#projects" class="back-link">← Ana Sayfaya Dön</a>
    <!-- Ayarlar Butonu -->
    <button class="settings-btn" onclick="toggleSettingsMenu()" title="Tema Ayarları">
        ⚙️
    </button>

    <!-- Ayarlar Menüsü -->
    <div class="settings-menu" id="settingsMenu">
        <div class="theme-toggle" onclick="toggleTheme()">
            <span id="themeText">Koyu Mod</span>
            <span id="themeIcon">🌙</span>
        </div>
    </div>

    <div class="header-section">
        <div class="basmala">بسم الله الرحمن الرحيم</div>
        <h1>İlim ve İbadet Takibi</h1>
        <p class="subtitle">Allah rızası için yaptıklarını takip et, manevi mertebeleri yükselt.</p>
    </div>

    <div class="stats-panel">
        <div class="stat-box">
            <div class="stat-val" id="totalPoints">0</div>
            <div class="stat-label">Toplam Sevap</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" id="completedCount">0</div>
            <div class="stat-label">İşlenen Amel</div>
        </div>
    </div>

    <div class="level-container">
                <div class="level-number" id="levelNumber">1</div>
        <div class="level-title" id="levelTitle">Mümin Adayı</div>
        <div class="level-progress" id="nextLevelInfo">Sonraki mertebeye geçiş için 50 amel lazım</div>
    </div>

    <div class="input-group">
        <select id="taskType">
            <option value="5 Vakit Namaz">5 Vakit Namaz</option>
            <option value="Kur'an Okuma">Kur'an Okuma</option>
            <option value="Ders Çalışma">Ders Çalışma (İlim)</option>
            <option value="Sadaka">Sadaka</option>
            <option value="Kütüphane">Kütüphane</option>
            <option value="Aileye Yardım">Aileye Yardım</option>
            <option value="Sabır">Sabır ve Şükür</option>
        </select>
        <button class="add-btn" onclick="addTask()">Ameli Kaydet</button>
    </div>

    <ul class="task-list" id="taskList">
        <!-- Görevler buraya gelecek (Yeni eklenenler üstte) -->
    </ul>
</div>


<script>
    // --- TEMA YÖNETİMİ (Dark/Light Mode) ---
    const settingsMenu = document.getElementById('settingsMenu');
    const themeText = document.getElementById('themeText');
    const themeIcon = document.getElementById('themeIcon');
    const htmlElement = document.documentElement;

    // Kayıtlı temayı kontrol et (Varsayılan 'light')
    const savedTheme = localStorage.getItem('theme') || 'light';
    htmlElement.setAttribute('data-theme', savedTheme);
    updateThemeUI(savedTheme);

    // Ayarlar menüsünü aç/kapa
    function toggleSettingsMenu() {
        settingsMenu.classList.toggle('active');
    }

    // Temayı değiştir
    function toggleTheme() {
        const currentTheme = htmlElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        
        htmlElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeUI(newTheme);
    }

    // Menüdeki yazı ve ikonu güncelle
    function updateThemeUI(theme) {
        if (theme === 'dark') {
            themeText.textContent = 'Aydınlık Mod';
            themeIcon.textContent = '☀️';
        } else {
            themeText.textContent = 'Koyu Mod';
            themeIcon.textContent = '🌙';
        }
    }

    // Menü dışına tıklandığında menüyü kapat
    document.addEventListener('click', function(event) {
        const isClickInside = settingsMenu.contains(event.target) || event.target.classList.contains('settings-btn');
        if (!isClickInside && settingsMenu.classList.contains('active')) {
            settingsMenu.classList.remove('active');
        }
    });

    // --- MEVCUT GÖREV MANTIĞI ---
    
    // Verileri Tarayıcıda Sakla
    let tasks = JSON.parse(localStorage.getItem('studentTasks')) || [];

    // Verileri Kaydetme ve Arayüzü Güncelleme Fonksiyonu
    function saveData() {
        try {
            localStorage.setItem('studentTasks', JSON.stringify(tasks));
            renderTasks();
            updateStats();
        } catch (e) {
            console.error("Veri kaydedilemedi:", e);
            alert("Tarayıcı hafızası dolu olabilir veya izin vermiyor. Lütfen tarayıcı geçmişi temizlemeyi deneyin.");
        }
    }

    function addTask() {
        const select = document.getElementById('taskType');
        const type = select.value;
        
        // Seçili option'ın metnini al
        const selectedOption = select.options[select.selectedIndex];
        const name = selectedOption.text; 

        const points = getPoints(type);
        
        const newTask = {
            id: Date.now(),
            name: name,
            points: points,
            completed: false,
            date: new Date().toLocaleDateString('tr-TR', { year: 'numeric', month: 'long', day: 'numeric' })
        };

        tasks.push(newTask);
        saveData();
    }

    function getPoints(type) {
        if(type.includes("Namaz")) return 10;
        if(type.includes("Kur'an")) return 5;
        if(type.includes("Ders")) return 3;
        if(type.includes("Sadaka")) return 5;
        return 2;
    }

    function toggleTask(id) {
        const index = tasks.findIndex(t => t.id === id);
        if (index !== -1) {
            tasks[index].completed = !tasks[index].completed;
            saveData();
        }
    }

    function deleteTask(id) {
        if(confirm("Bu ameli silmek istediğinize emin misiniz? (Bu işlem geri alınamaz)")) {
            const initialLength = tasks.length;
            tasks = tasks.filter(t => t.id !== id);
            
            if (tasks.length < initialLength) {
                saveData();
            } else {
                alert("İşlem bulunamadı veya zaten silinmiş.");
            }
        }
    }

    // İslami Seviye Mantığı
    function updateStats() {
        const total = tasks.filter(t => t.completed).reduce((sum, t) => sum + t.points, 0);
        const completed = tasks.filter(t => t.completed).length;
        
        document.getElementById('totalPoints').innerText = total;
        document.getElementById('completedCount').innerText = completed;

        const pointsPerLevel = 50;
        let currentLevel = 1 + Math.floor(total / pointsPerLevel);
        
        const pointsNeeded = (currentLevel * pointsPerLevel) - total;
        
        const titles = [
            "Mümin Adayı", "Talebe", "Salih", "Mücahid", "Muhsin", 
            "Tevafuklu", "Sıddık", "Mü'min-i Kâmil", "Hâzık", "Rabbanî", 
            "Mücahid-i Ekber", "İlim Sahibi", "Hakikat Ehli", "Allâh'ın Kulu", 
            "Mücahid-i Rabbânî", "Hizmetkâr", "Mürşid-i Ahsen", "İlham Sahibi", 
            "Sırat-ı Mustakîm", "Cennetlik"
        ];

        let titleIndex = currentLevel - 1;
        let levelTitle = "Mümin"; 

        if (titleIndex < titles.length) {
            levelTitle = titles[titleIndex];
        } else {
            levelTitle = `Mümin-i Kâmil (Sv. ${currentLevel})`;
        }

        document.getElementById('levelNumber').innerText = currentLevel;
        document.getElementById('levelTitle').innerText = levelTitle;
        
        let progressText = "";
        if (pointsNeeded <= 0 && total % pointsPerLevel === 0) {
             progressText = "Mertebe yükseldi! Allah kabul etsin. 🤲";
        } else {
             let nextTitle = titles[Math.min(titleIndex + 1, titles.length - 1)];
             progressText = `${pointsNeeded} amel daha: ${nextTitle} mertebesine`;
        }
        document.getElementById('nextLevelInfo').innerText = progressText;
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        
        const reversedTasks = [...tasks].reverse();

        if (reversedTasks.length === 0) {
            list.innerHTML = `<li style="text-align:center; padding: 20px; color: var(--text-light); font-style: italic;">Henüz hiç amel kaydedilmedi. İlk adımını şimdiden at!</li>`;
            return;
        }

        reversedTasks.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            
            li.innerHTML = `
                <div class="task-info">
                    <div class="task-name">${task.name}</div>
                    <div class="task-meta">
                        <span>${task.date}</span>
                        <span class="task-points">+${task.points} Sevap</span>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-check" onclick="toggleTask(${task.id})" title="${task.completed ? 'İşareti kaldır' : 'Tamamla'}">
                        ${task.completed ? '✓' : '○'}
                    </button>
                    <button class="btn-delete" onclick="deleteTask(${task.id})" title="Sil">
                        ✕
                    </button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    // İlk yükleme
    renderTasks();
    updateStats();
</script>

</body>
</html>
