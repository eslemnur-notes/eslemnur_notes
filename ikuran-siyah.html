      :root {--bg-color: #f0f0f0;

        /* --- GENEL AYARLAR --- */
      body {
        background-color: var(--bg-color);

      /* --- MOBİL --- */
      .ipod-container {
        width: 300px;
        height: 500px;
        background: linear-gradient(135deg, var(--container-prim) 0%, var(--container-sec) 100%);
        border-radius: 45px;
        border: none;
        
        box-shadow:
        15px 15px 40px var(--shadow-dark),
        -5px -5px 20px rgba(255, 255, 255, 0.05), 
        
        inset 2px 2px 6px var(--shadow-light),
        inset -2px -2px 6px var(--shadow-deep),
        inset 0 0 25px rgba(0, 0, 0, 0.6);
        
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 22px;
        position: relative;
        transition: all 0.3s ease;
      }

      
      .ipod-container::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 45px;
        box-shadow:
        15px 15px 40px var(--shadow-dark),
        -5px -5px 20px rgba(255, 255, 255, 0.05), 
        
        inset 2px 2px 6px var(--shadow-light),
        inset -2px -2px 6px var(--shadow-deep),
        inset 0 0 25px rgba(0, 0, 0, 0.6);
        
        pointer-events: none;
        z-index: 1;
      }
      .screen {
        width: 240px;
        height: 200px;
        background-color: var(--bg-screen);
        border: 1px solid #333;
        border-radius: 12px;
        margin-bottom: 35px;
        overflow: hidden;
        position: relative;
        z-index: 2;
        box-shadow: 
        inset 0 0 15px rgba(0,0,0,0.4), 
        0 5px 15px rgba(0,0,0,0.4); 
      }

     

      .click-wheel {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: linear-gradient(145deg, #000000, #1a1a1a);
        border: 1px solid #111;
        position: relative;
        z-index: 2;
        box-shadow: 
        8px 8px 20px var(--shadow-dark),
        -4px -4px 10px rgba(255, 255, 255, 0.05),
        inset 2px 2px 5px var(--shadow-light),
        inset -2px -2px 5px var(--shadow-deep),
        inset 0 0 10px rgba(0, 0, 0, 0.8);
        touch-action: none;
      }
        
      
      .wheel-center {
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, var(--container-sec) 0%, var(--container-prim) 100%);
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid #000;
        box-shadow: 
        3px 3px 8px var(--shadow-dark),
        -2px -2px 5px rgba(255, 255, 255, 0.05),
        inset 1px 1px 2px var(--shadow-dark);
        cursor: pointer;
        z-index: 3;
      }

      /* Tekerlek basıldığında efekt */
      .wheel-center:active {
        transform: translate(-50%, -50%) scale(0.96);
        box-shadow: 
          inset 3px 3px 8px var(--shadow-deep),
          inset -2px -2px 5px rgba(255, 255, 255, 0.02),
          inset 0 0 10px rgba(0, 0, 0, 0.9);
      }
      
      .wheel-label {

<script>
    // --- Değişkenler ---
    let surahs = [];
    let currentIndex = 0;
    let isPlaying = false;
    const audio = document.getElementById('audio-player');
    const listEl = document.getElementById('surah-list');
    const playerView = document.getElementById('player-view');
    const settingsView = document.getElementById('settings-view');
    const npTitle = document.getElementById('np-title');
    const progressBar = document.getElementById('progress-bar');
    const progressContainer = document.getElementById('progress-container');
    const centerBtn = document.getElementById('center-btn');
    const wheel = document.getElementById('wheel');
    
    // Tema butonları
        const btnTheme = document.getElementById('btn-theme');
    const themeIcon = document.getElementById('theme-icon');
    const themeText = document.getElementById('theme-text');
    
    // Yeni özellikler
    const btnPrevTrack = document.getElementById('btn-prev-track');
    const btnNextTrack = document.getElementById('btn-next-track');
    const btnRepeat = document.getElementById('btn-repeat');
    const btnShuffle = document.getElementById('btn-shuffle');
    const btnSpeedDown = document.getElementById('btn-speed-down');
    const btnSpeedUp = document.getElementById('btn-speed-up');
    const speedDisplay = document.getElementById('speed-display');
    
    // Tekrar ve karıştır modları
    let repeatMode = false;
    let shuffleMode = false;
    let shuffledIndices = [];
    let currentShuffleIndex = 0;
    
    // Oynatma hızı
    let playbackSpeed = 1.0;
    const speedLevels = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0];
    
    // Ses seviyesi kontrolü 
    let targetVolume = 1.0;
    let volumeInterval = null;

    // --- Mesaj Gösterme Fonksiyonu ---
    function showMessage(msgId, text, timeout = 1000) {
        
        document.querySelectorAll('.status-msg').forEach(el => el.style.opacity = '0');
        
        
        const msgEl = document.getElementById(msgId);
        if (msgEl) {
            msgEl.textContent = text;
            msgEl.style.opacity = '1';
            
            if (timeout > 0) {
                setTimeout(() => {
                    msgEl.style.opacity = '0';
                }, timeout);
            }
        }
    }

    // --- 1. Veri Çekme (Al Quran Cloud API) ---
    async function fetchSurahs() {
        try {
            const response = await fetch('https://api.alquran.cloud/v1/edition?format=audio&language=ar');
            const data = await response.json();
            
            const metaResponse = await fetch('https://api.alquran.cloud/v1/surah');
            const metaData = await metaResponse.json();
            surahs = metaData.data;

            renderList();
        } catch (error) {
            listEl.innerHTML = '<li style="padding:10px;">Hata oluştu.</li>';
            console.error(error);
        }
    }

    // --- 2. Listeyi Ekrana Basma ---
    function renderList() {
        listEl.innerHTML = '';
        
        surahs.forEach((surah, index) => {
            const li = document.createElement('li');
            li.className = `surah-item ${index === currentIndex ? 'active' : ''}`;
            li.textContent = `${surah.number}. ${surah.name}`;
            
            // Karıştır modu aktifse gerçek dizin yerine şifrelenmiş indeksi kullan
            if (shuffleMode) {
                li.addEventListener('click', () => selectSurahByShuffle(index));
            } else {
                li.addEventListener('click', () => selectSurah(index));
            }
            
            listEl.appendChild(li);
        });
        
        // Aktif öğeyi ortala
        const activeItem = listEl.children[currentIndex];
        if (activeItem) {
            activeItem.scrollIntoView({ block: 'center' });
        }
    }

    // --- 3. Sure Seçme ve Oynatma ---
    function selectSurah(index) {
        currentIndex = index;
        renderList(); 
        
        const surah = surahs[currentIndex];
        
        showMessage('msg-loading', "Yükleniyor...", 0);
        
        const directUrl = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${surah.number}.mp3`;
        
        loadAndPlay(directUrl, surah.name);
    }

    // Karıştır modunda sure seçimi
    function selectSurahByShuffle(shuffledIndex) {
        if (!shuffledMode || !shuffledIndices.length) return;
        
        currentIndex = shuffledIndices[shuffledIndex];
        currentShuffleIndex = shuffledIndex;
        renderList();
        
        const surah = surahs[currentIndex];
        showMessage('msg-loading', "Yükleniyor...", 0);
        
        const directUrl = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${surah.number}.mp3`;
        
        loadAndPlay(directUrl, surah.name);
    }

    function loadAndPlay(url, name) {
        audio.src = url;
        audio.playbackRate = playbackSpeed;
        audio.loop = repeatMode;
        
        audio.play().then(() => {
            isPlaying = true;
            showPlayerView(name);
            showMessage('msg-player', "Oynatılıyor");
        }).catch(e => {
            console.log("Oynatma hatası", e);
            showMessage('msg-loading', "Oynatılamadı", 2000);
        });
    }

    function showPlayerView(name) {
        listEl.style.display = 'none';
        settingsView.style.display = 'none';
        playerView.style.display = 'flex';
        npTitle.textContent = name;
    }

    function showListView() {
        playerView.style.display = 'none';
        settingsView.style.display = 'none';
        listEl.style.display = 'block';
        audio.pause();
        isPlaying = false;
        showMessage('msg-player', '', 0);
    }

    // --- 4. Click Wheel Mantığı (Dokunmatik/Fare) ---
    let startX, startY;
    let isDragging = false;
    let lastAngle = 0;
    let lastSkipTime = 0;
    const SKIP_SECONDS = 5;

    wheel.addEventListener('mousedown', startDrag);
    wheel.addEventListener('touchstart', startDrag, {passive: false});

    window.addEventListener('mousemove', onDrag);
    window.addEventListener('touchmove', onDrag, {passive: false});

    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    // Mouse hareketiyle ses açma/kısma (sol/sağ kenarlarda uzun basınca)
    let wheelLongPressTimer = null;

    function startDrag(e) {
        if(e.target === centerBtn) return;
        isDragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const rect = wheel.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        lastAngle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
        
        // Uzun basma tespiti
        wheelLongPressTimer = setTimeout(() => {
            // Tekerlek uzun basınca ses kontrolüne geç
            if (playerView.style.display === 'flex') {
                toggleVolumeControl();
            }
        }, 800);
    }

    function onDrag(e) {
    if (!isDragging) return;
    e.preventDefault();

    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const rect = wheel.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    const currentAngle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
    let delta = currentAngle - lastAngle;

    if (delta < -180) delta += 360;
    if (delta > 180) delta -= 360;

    if (Math.abs(delta) > 15) {
        clearTimeout(wheelLongPressTimer);
        
        // PLAYER AÇIKSA - SES SARMA
        if (playerView.style.display === 'flex') {
            if (Date.now() - lastSkipTime < 300) return;
            
            if (delta > 0) {
                audio.currentTime = Math.min(audio.duration, audio.currentTime + SKIP_SECONDS);
                showMessage('msg-skip', "+" + SKIP_SECONDS + "s");
            } else {
                audio.currentTime = Math.max(0, audio.currentTime - SKIP_SECONDS);
                showMessage('msg-skip', "-" + SKIP_SECONDS + "s");
            }
            lastSkipTime = Date.now();
        } 
        // AYARLAR AÇIKSA - KAYDIRMA
        else if (settingsView.style.display !== 'none') {
            const scrollAmount = delta > 0 ? 40 : -40; // Pozitif döndükçe aşağı, negatif döndükçe yukarı
            settingsView.scrollTop += scrollAmount;
            // Kaydırma mesajı göster
            showMessage('msg-player', '', 0);
        }
        // LİSTE AÇIKSA - GEZİNME
        else {
            changeSelection(delta > 0 ? 1 : -1);
        }
        
        lastAngle = currentAngle;
    }
}

    function endDrag() {
        isDragging = false;
        clearTimeout(wheelLongPressTimer);
    }

    function changeSelection(direction) {
        if (playerView.style.display === 'flex') return;
        
        let newIndex;
        if (shuffleMode && shuffledIndices.length) {
            // Karıştır modunda bir sonraki rastgele öğeye git
            currentShuffleIndex = (currentShuffleIndex + direction + shuffledIndices.length) % shuffledIndices.length;
            newIndex = shuffledIndices[currentShuffleIndex];
        } else {
            newIndex = currentIndex + direction;
            if (newIndex < 0) newIndex = surahs.length - 1;
            if (newIndex >= surahs.length) newIndex = 0;
        }
        
        currentIndex = newIndex;
        renderList();
    }

    // --- 5. Orta Tuş (Select) - Çift Tıklama ile Tekrar ---
    let lastClickTime = 0;

    centerBtn.addEventListener('click', () => {
        const now = Date.now();
        
        if (playerView.style.display === 'flex') {
            // Çalar açıksa: Duraklat/Oynat
            if (now - lastClickTime < 300) {
                // Çift tıklama: Döngü modunu değiştir
                toggleRepeatMode();
            } else {
                // Tek tıklama: Normal oynat/durdur
                if (audio.paused) {
                    audio.play();
                    isPlaying = true;
                    showMessage('msg-player', "Oynatılıyor");
                } else {
                    audio.pause();
                    isPlaying = false;
                    showMessage('msg-player', "Duraklatıldı");
                }
            }
        } else {
            // Liste veya ayarlar açıksa: Seç ve Oynat
            if (settingsView.style.display !== 'none') {
                // Ayarlar görünümündeysek listeye dön
                showListView();
            } else {
                selectSurah(currentIndex);
            }
        }
        
        lastClickTime = now;
    });

    // --- 6. Yan Tuşlar (Geri/İleri/Oynat) ---
    document.querySelector('.lbl-menu').addEventListener('click', () => {
        if (playerView.style.display === 'flex') {
            showListView();
            return;
        }

        if (listEl.style.display !== 'none') {
            listEl.style.display = 'none';
            settingsView.style.display = 'flex';
            showMessage('msg-player', 'Ayarlar', 0);
        } else if (settingsView.style.display !== 'none') {
            settingsView.style.display = 'none';
            listEl.style.display = 'block';
            showMessage('msg-player', '', 0);
        }
    });

    // lbl-prev event listener
document.querySelector('.lbl-prev').addEventListener('click', () => {
    if (playerView.style.display === 'flex') {
        audio.currentTime = Math.max(0, audio.currentTime - 10);
        showMessage('msg-skip', "-10s");
    } else if (settingsView.style.display !== 'none') {
        // Ayarlardayken yukarı kaydır
        settingsView.scrollTop = Math.max(0, settingsView.scrollTop - 50);
    } else if (listEl.style.display === 'none') {
        
        changeSelection(-1);
    } else {
        changeSelection(-1);
    }
});


document.querySelector('.lbl-next').addEventListener('click', () => {
    if (playerView.style.display === 'flex') {
        audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        showMessage('msg-skip', "+10s");
    } else if (settingsView.style.display !== 'none') {
        // Ayarlardayken aşağı kaydır
        const maxScroll = settingsView.scrollHeight - settingsView.clientHeight;
        settingsView.scrollTop = Math.min(maxScroll, settingsView.scrollTop + 50);
    } else {
        changeSelection(1);
    }
});

    // Play/Pause butonu - Uzun basınca ses kontrolü
    const playPauseBtn = document.querySelector('.lbl-play');
    let longPressTimer;

    playPauseBtn.addEventListener('mousedown', startButtonLongPress);
    playPauseBtn.addEventListener('touchstart', startButtonLongPress);

    function startButtonLongPress(e) {
        e.preventDefault();
        longPressTimer = setTimeout(() => {
            toggleVolumeControl();
        }, 800);
        
        // Kısa basma işlemi
        if (playerView.style.display === 'flex') {
            if (audio.paused) {
                audio.play();
                isPlaying = true;
                showMessage('msg-player', "Oynatılıyor");
            } else {
                audio.pause();
                isPlaying = false;
                showMessage('msg-player', "Duraklatıldı");
            }
        } else if (listEl.style.display !== 'none') {
            selectSurah(currentIndex);
        }
    }

    playPauseBtn.addEventListener('mouseup', () => clearTimeout(longPressTimer));
    playPauseBtn.addEventListener('mouseleave', () => clearTimeout(longPressTimer));
    playPauseBtn.addEventListener('touchend', () => clearTimeout(longPressTimer));

    // --- 7. Player İçindeki Kontroller ---
    btnPrevTrack.addEventListener('click', () => {
        if (currentIndex > 0) {
            selectSurah(currentIndex - 1);
        } else {
            selectSurah(surahs.length - 1);
        }
    });

    btnNextTrack.addEventListener('click', () => {
        if (currentIndex < surahs.length - 1) {
            selectSurah(currentIndex + 1);
        } else {
            selectSurah(0);
        }
    });

    // Progress Bar Tıklanabilirliği
    progressContainer.addEventListener('click', function(e) {
        if (!audio.duration) return;
        
        const rect = this.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;
        const percent = clickX / width;
        audio.currentTime = percent * audio.duration;
        showMessage('msg-skip', formatTime(audio.currentTime));
    });

        // --- 8. Tema Değiştirme ---
    
    function updateThemeButton() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            themeIcon.className = 'fas fa-sun';
            themeText.textContent = 'Aydınlık Mod';
        } else {
            themeIcon.className = 'fas fa-moon';
            themeText.textContent = 'Koyu Mod';
        }
    }

    
    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        showMessage('msg-player', theme === 'light' ? "Aydınlık Mod" : "Koyu Mod");
    }

    
    btnTheme.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        setTheme(newTheme);
        updateThemeButton();
    });

    
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        setTheme(savedTheme);
    }
    updateThemeButton(); 

    

        // --- 9. Tekrar Mode ---
    function toggleRepeatMode() {
        repeatMode = !repeatMode;
        audio.loop = repeatMode;
        
        if (repeatMode) {
            showMessage('msg-repeat', "Tekrar Modu Açık", 2000);
            btnRepeat.style.background = '#2E7D32';
            btnRepeat.style.color = '#fff';
        } else {
            showMessage('msg-repeat', "Tekrar Modu Kapalı", 2000);
            btnRepeat.style.background = ''; // CSS'e geri dön
            btnRepeat.style.color = '';
        }
    }
    btnRepeat.addEventListener('click', () => toggleRepeatMode());

        // --- 10. Karıştır Mode ---
    function toggleShuffleMode() {
        shuffleMode = !shuffleMode;
        
        if (shuffleMode) {
            shuffledIndices = [...Array(surahs.length).keys()];
            shuffleArray(shuffledIndices);
            currentShuffleIndex = 0;
            showMessage('msg-shuffle', "Karıştır Modu Açık", 2000);
            btnShuffle.style.background = '#EF6C00';
            btnShuffle.style.color = '#fff';
        } else {
            shuffledIndices = [];
            currentShuffleIndex = 0;
            showMessage('msg-shuffle', "Karıştır Modu Kapalı", 2000);
            btnShuffle.style.background = ''; 
            btnShuffle.style.color = '';
        }
        
        renderList();
    }
    btnShuffle.addEventListener('click', () => toggleShuffleMode());

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // --- 11. Ses Kontrolü ---
    function toggleVolumeControl() {
        if (volumeInterval) {
            clearInterval(volumeInterval);
            volumeInterval = null;
            showMessage('msg-volume', '');
            return;
        }
        
        // Ses artır/kısma döngüsü
        let direction = audio.volume < 0.5 ? 1 : -1;
        
        volumeInterval = setInterval(() => {
            targetVolume = Math.max(0, Math.min(1, audio.volume + (direction * 0.1)));
            audio.volume = targetVolume;
            showMessage('msg-volume', 'Ses: ' + Math.round(targetVolume * 100) + '%', 0);
            
            if ((direction === 1 && targetVolume >= 1) || (direction === -1 && targetVolume <= 0)) {
                clearInterval(volumeInterval);
                volumeInterval = null;
            }
        }, 200);
    }

    // --- 12. Hız Kontrolü ---
    function changePlaybackSpeed(direction) {
        let index = speedLevels.indexOf(playbackSpeed);
        index += direction;
        
        if (index < 0) index = speedLevels.length - 1;
        if (index >= speedLevels.length) index = 0;
        
        playbackSpeed = speedLevels[index];
        audio.playbackRate = playbackSpeed;
        speedDisplay.textContent = playbackSpeed + 'x';
        showMessage('msg-speed', playbackSpeed + 'x Hız');
    }

    btnSpeedDown.addEventListener('click', () => changePlaybackSpeed(-1));
    btnSpeedUp.addEventListener('click', () => changePlaybackSpeed(1));

    // Mouse ile tekerleğe scroll yapıldığında hız değişimi
    wheel.addEventListener('wheel', (e) => {
        if (settingsView.style.display !== 'none') {
            e.preventDefault();
            const direction = e.deltaY > 0 ? -1 : 1;
            changePlaybackSpeed(direction);
        }
    });

    // --- 13. Audio Progress Bar Güncelleme ---
    audio.addEventListener('timeupdate', () => {
        if(audio.duration) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + '%';
            
            document.getElementById('curr-time').textContent = formatTime(audio.currentTime);
            document.getElementById('dur-time').textContent = formatTime(audio.duration);
        }
    });

    // Audio bittiğinde otomatik bir sonrakine geç
    audio.addEventListener('ended', () => {
        if (repeatMode) return; // Tekrar modunda aynı şarkıyı tekrar çal
        
        if (shuffleMode && shuffledIndices.length) {
            // Karıştır modunda sıradaki rastgele şarkıya geç
            currentShuffleIndex = (currentShuffleIndex + 1) % shuffledIndices.length;
            currentIndex = shuffledIndices[currentShuffleIndex];
        } else {
            // Normal modda bir sonrakine geç
            let next = currentIndex + 1;
            if(next >= surahs.length) {
                if (repeatMode) {
                    next = 0;
                } else {
                    showMessage('msg-player', "Süre Tamamlandı", 2000);
                    return;
                }
            }
            currentIndex = next;
        }
        
        selectSurah(currentIndex);
    });

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // Başlat
    fetchSurahs();

</script>
