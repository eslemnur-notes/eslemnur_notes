<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nur Kuran-ı Kerim | Eslem Nur Çetin</title>
    
    <!-- Google Fonts: Sitenizle aynı fontları ekliyoruz -->
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* SİTENİZİN RENK PALETİ (Aynısından) */
        :root {
            --primary-color: #B76E79;
            --secondary-color: #FDF5E6;
            --button-bg: #D4A5A5;
            --button-hover: #C58F8F;
            --accent-color: #9E7F7F;
            --bg-color: #FFF9F9;
            --card-bg: #FFFFFF;
            --text-color: #4E342E;
            --text-light: #8D6E63;
            --border-color: #F0E6E6;
            --note-bg: #FFF0F5;
            --gold: #D4A5A5;
        }

        body { 
            font-family: 'Lato', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.7;
        }

        .container { 
            max-width: 800px; 
            margin: 0 auto; 
        }

        header { 
            text-align: center; 
            margin-bottom: 2rem; 
            padding: 20px 0;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            color: var(--primary-color); 
            font-size: 2.5rem; 
            margin-bottom: 10px;
        }

        .header-sub {
            font-family: 'Lato', sans-serif;
            color: var(--text-light);
            font-size: 1.1rem;
        }
        
        .controls { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            margin-bottom: 30px; 
            flex-wrap: wrap;
        }

        select { 
            padding: 12px 20px; 
            border: 2px solid var(--border-color); 
            border-radius: 30px; 
            background: var(--card-bg); 
            color: var(--text-color); 
            font-family: 'Lato', sans-serif; 
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
            min-width: 200px;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        button { 
            padding: 12px 30px; 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 30px; 
            font-family: 'Lato', sans-serif; 
            font-weight: 600; 
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(183, 110, 121, 0.3);
        }

        button:hover { 
            background: var(--button-hover); 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(183, 110, 121, 0.4);
        }
        
        .quran-display { 
            background: var(--card-bg); 
            padding: 2rem; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(183, 110, 121, 0.15); 
            text-align: center; 
            border: 1px solid var(--border-color);
        }

        .arabic { 
            font-family: 'Scheherazade New', serif; 
            font-size: 2.2rem; 
            line-height: 2.4; 
            direction: rtl; 
            color: var(--text-color); 
            margin-bottom: 1.5rem; 
            font-weight: 700;
        }

        .translation { 
            font-size: 1.1rem; 
            color: var(--text-light); 
            line-height: 1.8; 
            text-align: left; 
            font-family: 'Lato', sans-serif;
            margin-top: 10px;
            background: var(--note-bg);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--primary-color);
        }

        .basmala { 
            font-family: 'Scheherazade New', serif; 
            font-size: 1.8rem; 
            color: var(--primary-color); 
            margin-bottom: 2rem; 
            display: block; 
            direction: rtl;
            font-weight: 700;
        }
        
        .loading { 
            color: var(--accent-color); 
            font-style: italic; 
            font-size: 1.1rem;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .back-btn:hover {
            color: var(--primary-color);
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .arabic { font-size: 1.8rem; }
            .controls { flex-direction: column; }
            select { width: 100%; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌸 Nur Kuran-ı Kerim 🌸</h1>
            <p class="header-sub">Eslem Nur Çetin | İlim ve Kod</p>
        </header>

        <div class="controls">
            <select id="sureSelect">
                <option value="" disabled selected> bir sure seçiniz...</option>
            </select>
            <button onclick="getSure()">Oku</button>
        </div>

        <div id="content" class="quran-display">
            <p class="loading">Lütfen bir sure seçiniz...</p>
        </div>
        
        <a href="/" class="back-btn">← Ana Sayfaya Dön</a>
    </div>

    <script>
        // TÜRKÇE SURE İSİMLERİ EŞLEME TABLOSU
        const trSurahNames = {
            1: "Fatiha", 2: "Bakara", 3: "Ali İmran", 4: "Nisa", 5: "Maide", 6: "En'am", 7: "A'raf", 8: "Enfal", 9: "Tevbe", 10: "Yunus",
            11: "Hud", 12: "Yusuf", 13: "Rad", 14: "İbrahim", 15: "Hicr", 16: "Nahl", 17: "İsra", 18: "Kehf", 19: "Meryem", 20: "Taha",
            21: "Enbiya", 22: "Hac", 23: "Müminun", 24: "Nur", 25: "Furkan", 26: "Şuara", 27: "Neml", 28: "Kasas", 29: "Ankebut", 30: "Rum",
            31: "Lokman", 32: "Secde", 33: "Ahzab", 34: "Sebe", 35: "Fatır", 36: "Yasin", 37: "Saffat", 38: "Sa'd", 39: "Zümer", 40: "Mümin",
            41: "Fussilet", 42: "Şura", 43: "Zuhruf", 44: "Duhân", 45: "Câsiye", 46: "Ahkaf", 47: "Muhammed", 48: "Fetih", 49: "Hucurat", 50: "Kaf",
            51: "Zariyat", 52: "Tur", 53: "Necm", 54: "Kamer", 55: "Rahman", 56: "Vakıa", 57: "Hadid", 58: "Mücadele", 59: "Haşr", 60: "Mümtehine",
            61: "Saff", 62: "Cuma", 63: "Münafikun", 64: "Teğabün", 65: "Talak", 66: "Tahrim", 67: "Mülk", 68: "Kalem", 69: "Hakka", 70: "Meâric",
            71: "Nuh", 72: "Cin", 73: "Müzzemmil", 74: "Müddessir", 75: "Kıyâmet", 76: "İnsan", 77: "Mürselat", 78: "Nebe", 79: "Naziât", 80: "Abese",
            81: "Tekvîr", 82: "İnfitâr", 83: "Mutaffifîn", 84: "İnşikâk", 85: "Bürûc", 86: "Târık", 87: "A'lâ", 88: "Ğâşiye", 89: "Fecr", 90: "Beled",
            91: "Şems", 92: "Leyl", 93: "Duhâ", 94: "İnşirâh", 95: "Tîn", 96: "Alak", 97: "Kadir", 98: "Beyyine", 99: "Zilzâl", 100: "Adiyât",
            101: "Kâri'a", 102: "Tekâsür", 103: "Asr", 104: "Hümeze", 105: "Fîl", 106: "Kureyş", 107: "Mâûn", 108: "Kevser", 109: "Kâfirûn", 110: "Nasr",
            111: "Mesed", 112: "İhlâs", 113: "Felak", 114: "Nâs"
        };

        const sureSelect = document.getElementById('sureSelect');
        const contentDiv = document.getElementById('content');
        let surahData = [];

        // Sure listesini çek (Düzeltilmiş Versiyon)
        async function loadSurahList() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                surahData = data.data;
                
                sureSelect.innerHTML = '<option value="" disabled selected> bir sure seçiniz...</option>'; // Önce temizle
                
                surahData.forEach(surah => {
                    const option = document.createElement('option');
                    option.value = surah.number;
                    // Türkçe ismi kullan (eğer listede yoksa orijinal ismi kullan)
                    const trName = trSurahNames[surah.number] || surah.name;
                    option.text = `${surah.number}. ${trName}`;
                    sureSelect.appendChild(option);
                });
            } catch (error) {
                contentDiv.innerHTML = "<p>Veri yüklenirken hata oluştu. Lütfen sayfayı yenileyin.</p>";
            }
        }

        // Sureyi getir ve göster
        async function getSure() {
            const surahNumber = sureSelect.value;
            if(!surahNumber) {
                contentDiv.innerHTML = "<p>Lütfen bir sure seçiniz.</p>";
                return;
            }

            contentDiv.innerHTML = '<p class="loading">Yükleniyor...</p>';

            try {
                const resAr = await fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}/ar.alafasy`);
                const resTr = await fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}/tr.diyanet`);
                
                const dataAr = await resAr.json();
                const dataTr = await resTr.json();

                const ayahsAr = dataAr.data.ayahs;
                const ayahsTr = dataTr.data.ayahs;
                
                // Türkçe ismi göster
                const name = trSurahNames[surahNumber] || dataAr.data.name;

                let html = `<h2 style="font-family: 'Playfair Display', serif; color: var(--primary-color);">${name}</h2>`;
                
                // Besmele (1. ve 9. sure hariç)
                if(surahNumber != 1 && surahNumber != 9) {
                    html += `<span class="basmala">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</span>`;
                }

                ayahsAr.forEach((ayah, index) => {
                    const textAr = ayah.text.replace(/[\u0660-\u0669]/g, ''); 
                    const textTr = ayahsTr[index].text;
                    
                    html += `
                        <div class="arabic">${textAr} <span style="color:var(--primary-color); font-size:1.2rem; font-family:'Lato'">(${index + 1})</span></div>
                        <div class="translation">${textTr}</div>
                        <hr style="border:0; border-top:1px dashed var(--border-color); margin: 25px 0;">
                    `;
                });

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = "<p>Bir hata oluştu. Lütfen tekrar deneyin.</p>";
                console.error(error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadSurahList);
    </script>
</body>
</html>
