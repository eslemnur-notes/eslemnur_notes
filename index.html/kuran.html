<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nur Kuran-ı Kerim | Eslem Nur Çetin</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Playfair+Display:wght@400;600&family=Lato:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome İkonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- RENK PALETİ --- */
        :root {
            --primary-color: #B76E79;
            --secondary-color: #FDF5E6;
            --button-bg: #D4A5A5;
            --button-hover: #C58F8F;
            --accent-color: #9E7F7F;
            --bg-color: #FFF9F9;
            --card-bg: #FFFFFF;
            --text-color: #4E342E;
            --text-light: #8D6E63;
            --border-color: #F0E6E6;
            --note-bg: #FFF0F5;
            --nav-bg: rgba(255, 249, 249, 0.95);
            --shadow-color: rgba(183, 110, 121, 0.15);
            --header-bg: var(--nav-bg);
        }

        [data-theme="dark"] {
            --primary-color: #E08E98;
            --secondary-color: #2D2D2D;
            --button-bg: #A07070;
            --button-hover: #805050;
            --accent-color: #C0A0A0;
            --bg-color: #1A1A1A;
            --card-bg: #252525;
            --text-color: #EAEAEA;
            --text-light: #B0B0B0;
            --border-color: #444444;
            --note-bg: #333333;
            --nav-bg: rgba(26, 26, 26, 0.95);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --header-bg: var(--nav-bg);
        }

        /* --- GENEL AYARLAR --- */
* { box-sizing: border-box; transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }

body { 
    font-family: 'Lato', sans-serif; 
    background: var(--bg-color); 
    color: var(--text-color); 
    margin: 0; 
    padding: 0;
    line-height: 1.7;
}

.container { 
    max-width: 1100px; 
    margin: 0 auto; 
    padding: 0 20px; 
}

/* --- HEADER & NAV --- */
header {
    background: var(--header-bg);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0; /* Sticky header */
    z-index: 1000;
    border-bottom: 1px solid var(--border-color);
    padding: 15px 0;
}

nav { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    max-width: 1100px; /* Container ile aynı genişlik */
    margin: 0 auto; /* Ortala */
    padding: 0 20px; /* Container padding'i */
}

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--primary-color);
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
}

.logo span {
    font-family: 'Scheherazade New', serif;
    font-size: 1.2rem;
    color: var(--accent-color);
}

.nav-links { display: flex; gap: 30px; }
      
.nav-links a { font-weight: 400; color: var(--text-color); font-size: 0.95rem; position: relative; text-decoration: none; }
      
.nav-links a::after {
    content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0;
    background-color: var(--primary-color); transition: width 0.3s;
}
.nav-links a:hover::after { width: 100%; }

.theme-toggle {
    background: transparent;
    border: 2px solid var(--border-color);
    color: var(--text-color);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    margin-right: 15px;
}
.theme-toggle:hover { background: var(--note-bg); border-color: var(--primary-color); }

.hamburger {
    display: none;
    font-size: 1.8rem;
    color: var(--primary-color);
    cursor: pointer;
    padding: 5px;
    margin-left: auto;
    background: none;
    border: none;
    z-index: 1001;
}

/* --- İÇERİK STİLLERİ --- */
.header-sub {
    font-family: 'Lato', sans-serif;
    color: var(--text-light);
    font-size: 1.1rem;
    text-align: center;
    margin-bottom: 30px;
}


h1 { 
    font-family: 'Playfair Display', serif;
    color: var(--primary-color); 
    font-size: 2.5rem; 
    margin: 30px 0 10px 0; 
    text-align: center; 
    word-wrap: break-word;
    padding: 0 10px;
}

.controls { 
    display: flex; 
    gap: 15px; 
    justify-content: center; 
    margin-bottom: 30px; 
    flex-wrap: wrap;
}

select { 
    padding: 12px 20px; 
    border: 2px solid var(--border-color); 
    border-radius: 30px; 
    background: var(--card-bg); 
    color: var(--text-color); 
    font-family: 'Lato', sans-serif; 
    font-size: 1rem;
    cursor: pointer;
    outline: none;
    min-width: 200px;
}

select:focus { border-color: var(--primary-color); }

button { 
    padding: 12px 30px; 
    background: var(--primary-color); 
    color: white; 
    border: none; 
    border-radius: 30px; 
    font-family: 'Lato', sans-serif; 
    font-weight: 600; 
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 10px var(--shadow-color);
}

button:hover { 
    background: var(--button-hover); 
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(183, 110, 121, 0.4);
}

.quran-display { 
    background: var(--card-bg); 
    padding: 2rem; 
    border-radius: 20px; 
    box-shadow: 0 4px 15px var(--shadow-color); 
    text-align: center; 
    border: 1px solid var(--border-color);
}

.arabic { 
    font-family: 'Scheherazade New', serif; 
    font-size: 2.2rem; 
    line-height: 2.4; 
    direction: rtl; 
    color: var(--text-color); 
    margin-bottom: 1.5rem; 
    font-weight: 700;
}

.translation { 
    font-size: 1.1rem; 
    color: var(--text-light); 
    line-height: 1.8; 
    text-align: left; 
    font-family: 'Lato', sans-serif;
    margin-top: 10px;
    background: var(--note-bg);
    padding: 15px;
    border-radius: 10px;
    border-left: 4px solid var(--primary-color);
}

.basmala { 
    font-family: 'Scheherazade New', serif; 
    font-size: 1.8rem; 
    color: var(--primary-color); 
    margin-bottom: 2rem; 
    display: block; 
    direction: rtl;
    font-weight: 700;
}

.loading { 
    color: var(--accent-color); 
    font-style: italic; 
    font-size: 1.1rem;
}

.back-btn {
    display: inline-block;
    margin-top: 20px;
    color: var(--text-light);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.3s;
}
.back-btn:hover { color: var(--primary-color); }

/* --- MOBİL GÖRÜNÜM (DÜZELTİLDİ) --- */
@media (max-width: 768px) {
    .hamburger {
        display: block;
        order: 3; /* En sağda olsun */
        margin-left: 10px !important;
    }

    #themeToggle {
        display: flex; /* Mobilde de görünsün */
        order: 2; /* Hamburgerden önce gelsin */
        margin-right: 10px !important;
    }

    .logo {
        font-size: 1.2rem;
        order: 1; /* En solda olsun */
        flex-shrink: 1; /* Taşmayı önle */
        max-width: 50%; /* Logo çok büyümesin */
    }

    .logo span {
        display: none; /* Mobilde Arapça basmalleri gizle (yer kurtar) */
    }

    .nav-links {
        display: none;
        position: absolute;
        top: 100%; /* Header'ın hemen altına */
        left: 0;
        width: 100%;
        background: var(--card-bg);
        flex-direction: column;
        text-align: center;
        padding: 20px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
        z-index: 999;
        margin-top: 0; /* Fazla boşluk olmasın */
    }

    .nav-links.active {
        display: flex;
    }

    .nav-links a {
        padding: 15px;
        font-size: 1.1rem;
        border-bottom: 1px solid var(--border-color);
    }

    nav {
        flex-wrap: nowrap; /* Kırılma olmasın */
        justify-content: space-between;
        align-items: center;
        padding: 0 10px; /* Sağ/sol padding azalt */
    }

    header {
        padding: 10px 0;
    }

    h1 {
        font-size: 1.6rem;
        margin: 20px 0 10px 0;
        word-wrap: break-word;
        padding: 0 10px;
        text-align: center;
    }

    .arabic {
        font-size: 1.4rem; /* Biraz küçülttüm */
        line-height: 1.8;
    }

    .controls {
        flex-direction: column;
        gap: 10px;
    }

    select {
        width: 100%;
    }

    button {
        width: 100%;
    }

    .container {
        padding: 0 15px;
    }
}
    </style>
</head>
<body>

    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">
                    <span>بسم الله</span> Eslem Nur Çetin
                </a>
                
                <button id="themeToggle" class="theme-toggle" aria-label="Temayı Değiştir">
                    <i class="fas fa-moon"></i>
                </button>
                
                <button class="hamburger" onclick="toggleMenu()">
                    ☰
                </button>
                
                <div class="nav-links">
                    <a href="index.html#about">Hakkımda</a>
                    <a href="index.html#skills">Yetenekler</a>
                    <a href="index.html#projects">Projeler</a>
                    <a href="index.html#contact">İletişim</a>

                  <a href="index.html" style="color: #B76E79">Ana Sayfaya Dön</a>
                </div>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1>🌸 Nur Kuran-ı Kerim 🌸</h1>
        <p class="header-sub">رَبِّ زِدْنَا عِلْمًا | Rabbim, ilmimizi arttır.</p>

        <div class="controls">
            <select id="sureSelect">
                <option value="" disabled selected> bir sure seçiniz...</option>
            </select>
            <button onclick="getSure()">Oku</button>
        </div>

        <div id="content" class="quran-display">
            <p class="loading">Lütfen bir sure seçiniz...</p>
        </div>
        
        
    </div>

    <script>
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = themeToggleBtn.querySelector('i');

        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function updateThemeIcon(theme) {
            themeIcon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        }

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }

        const menuLinks = document.querySelectorAll('.nav-links a');
        menuLinks.forEach(link => {
            link.addEventListener('click', () => {
                const navLinks = document.querySelector('.nav-links');
                if (navLinks.classList.contains('active')) {
                    navLinks.classList.remove('active');
                }
            });
        });

        
        // TÜRKÇE SURE İSİMLERİ EŞLEME TABLOSU
        const trSurahNames = {
            1: "Fatiha", 2: "Bakara", 3: "Ali İmran", 4: "Nisa", 5: "Maide", 6: "En'am", 7: "A'raf", 8: "Enfal", 9: "Tevbe", 10: "Yunus",
            11: "Hud", 12: "Yusuf", 13: "Rad", 14: "İbrahim", 15: "Hicr", 16: "Nahl", 17: "İsra", 18: "Kehf", 19: "Meryem", 20: "Taha",
            21: "Enbiya", 22: "Hac", 23: "Müminun", 24: "Nur", 25: "Furkan", 26: "Şuara", 27: "Neml", 28: "Kasas", 29: "Ankebut", 30: "Rum",
            31: "Lokman", 32: "Secde", 33: "Ahzab", 34: "Sebe", 35: "Fatır", 36: "Yasin", 37: "Saffat", 38: "Sa'd", 39: "Zümer", 40: "Mümin",
            41: "Fussilet", 42: "Şura", 43: "Zuhruf", 44: "Duhân", 45: "Câsiye", 46: "Ahkaf", 47: "Muhammed", 48: "Fetih", 49: "Hucurat", 50: "Kaf",
            51: "Zariyat", 52: "Tur", 53: "Necm", 54: "Kamer", 55: "Rahman", 56: "Vakıa", 57: "Hadid", 58: "Mücadele", 59: "Haşr", 60: "Mümtehine",
            61: "Saff", 62: "Cuma", 63: "Münafikun", 64: "Teğabün", 65: "Talak", 66: "Tahrim", 67: "Mülk", 68: "Kalem", 69: "Hakka", 70: "Meâric",
            71: "Nuh", 72: "Cin", 73: "Müzzemmil", 74: "Müddessir", 75: "Kıyâmet", 76: "İnsan", 77: "Mürselat", 78: "Nebe", 79: "Naziât", 80: "Abese",
            81: "Tekvîr", 82: "İnfitâr", 83: "Mutaffifîn", 84: "İnşikâk", 85: "Bürûc", 86: "Târık", 87: "A'lâ", 88: "Ğâşiye", 89: "Fecr", 90: "Beled",
            91: "Şems", 92: "Leyl", 93: "Duhâ", 94: "İnşirâh", 95: "Tîn", 96: "Alak", 97: "Kadir", 98: "Beyyine", 99: "Zilzâl", 100: "Adiyât",
            101: "Kâri'a", 102: "Tekâsür", 103: "Asr", 104: "Hümeze", 105: "Fîl", 106: "Kureyş", 107: "Mâûn", 108: "Kevser", 109: "Kâfirûn", 110: "Nasr",
            111: "Mesed", 112: "İhlâs", 113: "Felak", 114: "Nâs"
        };

        const sureSelect = document.getElementById('sureSelect');
        const contentDiv = document.getElementById('content');
        let surahData = [];

        // Sure listesini çek
        async function loadSurahList() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                surahData = data.data;
                
                sureSelect.innerHTML = '<option value="" disabled selected> bir sure seçiniz...</option>';
                
                surahData.forEach(surah => {
                    const option = document.createElement('option');
                    option.value = surah.number;
                    const trName = trSurahNames[surah.number] || surah.name;
                    option.text = `${surah.number}. ${trName}`;
                    sureSelect.appendChild(option);
                });
            } catch (error) {
                contentDiv.innerHTML = "<p>Veri yüklenirken hata oluştu. Lütfen sayfayı yenileyin.</p>";
            }
        }

        // Sureyi getir ve göster
        async function getSure() {
            const surahNumber = sureSelect.value;
            if(!surahNumber) {
                contentDiv.innerHTML = "<p>Lütfen bir sure seçiniz.</p>";
                return;
            }

            contentDiv.innerHTML = '<p class="loading">Yükleniyor...</p>';

            try {
                const resAr = await fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}/ar.alafasy`);
                const resTr = await fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}/tr.diyanet`);
                
                const dataAr = await resAr.json();
                const dataTr = await resTr.json();

                const ayahsAr = dataAr.data.ayahs;
                const ayahsTr = dataTr.data.ayahs;
                
                const name = trSurahNames[surahNumber] || dataAr.data.name;

                let html = `<h2 style="font-family: 'Playfair Display', serif; color: var(--primary-color);">${name}</h2>`;
                
                // Besmele (Fatiha ve Tevbe hariç)
                if(surahNumber != 1 && surahNumber != 9) {
                    html += `<span class="basmala">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</span>`;
                }

                ayahsAr.forEach((ayah, index) => {
                    const textAr = ayah.text.replace(/[\u0660-\u0669]/g, ''); 
                    const textTr = ayahsTr[index].text;
                    
                    html += `
                        <div class="arabic">${textAr} <span style="color:var(--primary-color); font-size:1.2rem; font-family:'Lato'">(${index + 1})</span></div>
                        <div class="translation">${textTr}</div>
                        <hr style="border:0; border-top:1px dashed var(--border-color); margin: 25px 0;">
                    `;
                });

                contentDiv.innerHTML = html;

            } catch (error) {
                contentDiv.innerHTML = "<p>Bir hata oluştu. Lütfen tekrar deneyin.</p>";
                console.error(error);
            }
        }

        // Sayfa yüklendiğinde başlat
        window.addEventListener('DOMContentLoaded', () => {
            initTheme(); // Temayı başlat
            loadSurahList(); // Sure listesini çek
        });
    </script>
</body>
</html>
