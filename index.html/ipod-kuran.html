<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iKuran - iPod Style</title>
    <meta name="description" content="Eslem Nur Çetin - İlahiyat öğrencisi ve web geliştiricisinin iKuran uygulaması. Dijital iPod ile Kur'an dinle.">
    <meta name="keywords" content="İslami İlimler, Web Geliştirme, Tefsir, Arapça, Kuran, Proton, Eslem Nur Çetin, İmam Hatip, Dijital Notlar, iKuran, iPod, pink">
    <meta name="author" content="Eslem Nur Çetin">
    <meta name="robots" content="index, follow">
  
  <!-- Fontlar & İkonlar -->
    <link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
    <style>
      :root {--bg-color: #FFF9F9;
             --container-prim: #dd8399;
             --container-sec: #FFebf0;
             --bg-screen: #fff;
             --box-shadow: 0 15px 35px rgba(0,0,0,0.4);
             --border: #999;
      }
      [data-theme="dark"] {--bg-color: #1e1e1e;
             --container-prim: #dd8399;
             --container-sec: #FFebf0;
             --bg-screen: #fff;
             --box-shadow: 0 15px 35px rgba(0,0,0,0.6);
             --border: #555;}
      
        /* --- GENEL AYARLAR --- */
      body {
        background-color: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        user-select: none;
      }

      /* --- MOBİL VARSAYILAN (300x500) --- */
      .ipod-container {
        width: 300px;
        height: 500px;
        background: linear-gradient(135deg, var(--container-sec) 0%, var(--container-prim) 100%);
        border-radius: 45px;
        border: none;
        
        box-shadow: 
          10px 10px 20px rgba(0,0,0,0.15),
          -5px -5px 15px rgba(255,255,255,0.6), 
          inset 2px 2px 5px rgba(0,0,0,0.1),
          inset -2px -2px 5px rgba(255,255,255,0.4);
        
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 22px;
        position: relative;
        transition: all 0.3s ease;
      }

      .ipod-container::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        border-radius: 45px;
        box-shadow: 
          inset 0 0 10px rgba(0,0,0,0.1), 
          inset 2px 2px 5px rgba(255,255,255,0.5); 
        pointer-events: none;
        z-index: 1;
      }
      .screen {
        width: 240px;
        height: 200px;
        background-color: var(--bg-screen);
        border: 1px solid #999;
        border-radius: 12px;
        margin-bottom: 35px;
        overflow: hidden;
        position: relative;
        z-index: 2;
        box-shadow: 
          inset 3px 3px 8px rgba(0,0,0,0.3), 
          0 2px 5px rgba(0,0,0,0.1); 
      }


      .click-wheel {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: linear-gradient(145deg, #f0f0f0, #e6e6e6);
        border: 1px solid #d1d1d1;
        position: relative;
        z-index: 2;
        box-shadow: 
          5px 5px 10px rgba(0,0,0,0.1),
          -2px -2px 5px rgba(255,255,255,0.8),
          inset 2px 2px 5px rgba(0,0,0,0.05);
        touch-action: none;
      }
        

      .wheel-center {
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, var(--container-sec) 0%, var(--container-prim) 100%);
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid #ccc;
        box-shadow: 
          inset 2px 2px 5px rgba(255,255,255,0.4),
          inset -2px -2px 5px rgba(0,0,0,0.1);
        cursor: pointer;
        z-index: 3;
      }

      /* Tekerlek basıldığında efekt */
      .wheel-center:active {
        transform: translate(-50%, -50%) scale(0.98);
        box-shadow: 
          inset 3px 3px 8px rgba(0,0,0,0.2),
          inset -1px -1px 2px rgba(255,255,255,0.1);
      }
      
      .wheel-label {
        position: absolute;
        color: #999;
        font-size: 16px; /* Mobil için biraz daha küçük */
        font-weight: bold;
        text-transform: uppercase;
      }
      .lbl-menu { top: 10px; left: 50%; transform: translateX(-50%); }
      .lbl-prev { left: 10px; top: 50%; transform: translateY(-50%); }
      .lbl-next { right: 10px; top: 50%; transform: translateY(-50%); }
      .lbl-play { bottom: 10px; left: 50%; transform: translateX(-50%); }

      /* Liste ve Player Stilleri (Ortak) */
      .screen-header {
        background: #888;
        color: white;
        padding: 4px;
        font-size: 10px;
        text-align: center;
        display: flex;
        justify-content: space-between;
      }

      .surah-list {
        list-style: none;
        padding: 0;
        margin: 0;
        height: 160px;
        overflow-y: auto;
        font-size: 13px;
      }

      .surah-item {
        padding: 5px 8px;
        border-bottom: 1px solid #eee;
        cursor: pointer;
      }

      .surah-item.active {
        background-color: #007aff;
        color: white;
      }

      .player-view {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        background: #fff;
      }

      .now-playing-title {
        font-weight: bold;
        font-size: 14px;
        margin-bottom: 5px;
        padding: 0 10px;
      }

      .now-playing-reciter {
        font-size: 11px;
        color: #666;
        margin-bottom: 15px;
      }

      .progress-container {
        width: 70%;
        height: 5px;
        background: #eee;
        border-radius: 3px;
        margin: 10px 0;
        position: relative;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: #007aff;
        border-radius: 3px;
        transition: width 0.2s;
      }

      #status-msg {
        position: absolute;
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
        color: #888;
        font-size: 11px;
        display: none;
        white-space: nowrap;
        pointer-events: none;
      }

      /* --- AYARLAR BUTONLARI --- */
      .settings-btn {
        background: #dd8399;
        border: 1px solid #ccc;
        border-radius: 20px;
        padding: 5px;
        font-size: 12px;
        color: #fff;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
      }
      
      .settings-btn:hover {
        background: #B76E79;
        border-color: #ccc;
      }

      [data-theme="dark"] .settings-btn {
        background: #dd8399;
        color: #fff;
        border-color: #ccc;
      }

      [data-theme="dark"] .settings-btn:hover {
        background: #B76E79;
      }

      /* --- MASAÜSTÜ AYARLARI (769px ve üzeri) --- */
      @media (min-width: 769px) {
        .ipod-container {
          width: 400px;
          height: 600px;
          border-radius: 40px;
          padding: 20px;
          box-shadow: 
        15px 15px 30px rgba(0,0,0,0.2),
        -5px -5px 20px rgba(255,255,255,0.7),
        inset 2px 2px 5px rgba(0,0,0,0.1);
        }

        .screen {
          width: 340px;
          height: 300px;
          margin-bottom: 50px;
        }

        .click-wheel {
          width: 300px;
          height: 400px; /* Masaüstünde dikdörtgen (Classic model gibi) */
          border-radius: 50%; /* Yuvarlak görünüm korunur ama yüksekliği artar */
        }

        .wheel-center {
          width: 120px;
          height: 120px;
        }

        .wheel-label {
          font-size: 18px; /* Daha büyük ikonlar */
        }
        .lbl-menu { top: 35px; }
        .lbl-prev { left: 35px; }
        .lbl-next { right: 35px; }
        .lbl-play { bottom: 35px; }

        .surah-list {
          height: 260px;
          font-size: 14px;
        }

        .surah-item {
          padding: 6px 10px;
        }

        .now-playing-title {
          font-size: 25px;
        }

        .now-playing-reciter {
          font-size: 12px;
        }

        .progress-container {
          width: 80%;
          height: 6px;
        }
        
        #status-msg {
          font-size: 12px;
          right: 25px;
        }
        
        /* --- AYARLAR BUTONLARI --- */
      .settings-btn {
        border-radius: 20px;
        padding: 10px;
        font-size: 14px; }
      }
    </style>
</head>
<body>

<div class="ipod-container">
    
    <!-- Ekran -->
        <!-- Ekran -->
    <div class="screen">
        <div class="screen-header">
            <span>🔋 100%</span>
            <span>iKuran</span>
        </div>
        
        <!-- 1. Liste Görünümü -->
        <ul class="surah-list" id="surah-list">
            <li style="padding: 10px; text-align: center;">Yükleniyor...</li>
        </ul>

        <!-- 2. Çalar Görünümü (Mevcut) -->
        <div class="player-view" id="player-view">
            <div class="now-playing-title" id="np-title">Sure Adı</div>
            <div class="now-playing-reciter">Mishary Alafasy</div>
            <div style="font-size: 40px; "><i class='fa-solid fa-music' style='color: #dd8399'></i></div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div style="font-size:10px; color: #888;">
                <span id="curr-time">0:00</span> / <span id="dur-time">0:00</span>
            </div>
        </div>

        <!-- 3. AYARLAR GÖRÜNÜMÜ (YENİ EKLENEN) -->
        <div class="player-view" id="settings-view" style="display: none;">
            <div class="now-playing-title" style="margin-top: 30px" >Ayarlar</div>
            <div style="font-size: 14px; color: #666; margin-top: 10px;">Tema Seçimi</div>
            
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px; width: 60%;">
                <button id="btn-light" class="settings-btn">Aydınlık Mod ☀️</button>
                <button id="btn-dark" class="settings-btn">Koyu Mod 🌙</button>
            </div>
            
            <div style="margin-top: 30px; font-size: 10px; color: #999;">
                Menü'ye basarak dönün
            </div>
        </div>
        
        <!-- Durum Mesajı -->
        <div id="status-msg">Seçmek için Ortaya Basın</div>
    </div>
    <!-- Click Wheel -->
    <div class="click-wheel" id="wheel">
        <div class="wheel-label lbl-menu">Menu</div>
        <div class="wheel-label lbl-prev"><i class='fa fa-fast-backward'></i></div>
        <div class="wheel-label lbl-next"><i class='fa fa-fast-forward'></i></div>
        <div class="wheel-label lbl-play"><i class='fa fa-play'></i> <i class='fa fa-pause'></i></div>
        <div class="wheel-center" id="center-btn"></div>
    </div>
</div>

<!-- Gizli Audio Elementi -->
<audio id="audio-player"></audio>

<script>
    // --- Değişkenler ---
    let surahs = [];
    let currentIndex = 0;
    let isPlaying = false;
    const audio = document.getElementById('audio-player');
    const listEl = document.getElementById('surah-list');
    const playerView = document.getElementById('player-view');
    const npTitle = document.getElementById('np-title');
    const progressBar = document.getElementById('progress-bar');
    const centerBtn = document.getElementById('center-btn');
    const wheel = document.getElementById('wheel');
    const statusMsg = document.getElementById('status-msg');
    const settingsView = document.getElementById('settings-view');
    const btnLight = document.getElementById('btn-light');
    const btnDark = document.getElementById('btn-dark');

    // --- 1. Veri Çekme (Al Quran Cloud API) ---
    async function fetchSurahs() {
        try {
            // Sadece Arapça sesli okuma (Mishary Alafasy) ve Sure isimlerini çekiyoruz
            const response = await fetch('https://api.alquran.cloud/v1/edition?format=audio&language=ar');
            const data = await response.json();
            
            // Liste için sure metadata'sını ayrıca çekelim (İsimler için)
            const metaResponse = await fetch('https://api.alquran.cloud/v1/surah');
            const metaData = await metaResponse.json();
            surahs = metaData.data;

            renderList();
        } catch (error) {
            listEl.innerHTML = '<li style="padding:10px;">Hata oluştu.</li>';
            console.error(error);
        }
    }

    // --- 2. Listeyi Ekrana Basma ---
    function renderList() {
        listEl.innerHTML = '';
        surahs.forEach((surah, index) => {
            const li = document.createElement('li');
            li.className = `surah-item ${index === currentIndex ? 'active' : ''}`;
            li.textContent = `${surah.number}. ${surah.name}`; // Sadece Arapça isim
            li.onclick = () => selectSurah(index);
            listEl.appendChild(li);
        });
        // Aktif öğeyi ortala
        listEl.children[currentIndex].scrollIntoView({ block: 'center' });
    }

    // --- 3. Sure Seçme ve Oynatma ---
    function selectSurah(index) {
        currentIndex = index;
        renderList(); 
        
        const surah = surahs[currentIndex];
        
        
        statusMsg.style.display = 'block';
        statusMsg.textContent = "Yükleniyor...";
        
        fetch(`https://api.alquran.cloud/v1/surah/${surah.number}/ar.alafasy`)
            .then(res => res.json())
            .then(data => {
                const audioUrl = data.data.ayahs[0].audio; 
                
                const directUrl = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${surah.number}.mp3`;
                
                loadAndPlay(directUrl, surah.name);
            });
    }

    function loadAndPlay(url, name) {
        audio.src = url;
        audio.play().then(() => {
            isPlaying = true;
            showPlayerView(name);
            statusMsg.style.display = 'none';
        }).catch(e => {
            console.log("Oynatma hatası", e);
            statusMsg.textContent = "Oynatılamadı";
        });
    }

    function showPlayerView(name) {
        listEl.style.display = 'none';
        playerView.style.display = 'flex';
        npTitle.textContent = name;
    }

        function showListView() {
        playerView.style.display = 'none';
        settingsView.style.display = 'none'; 
        listEl.style.display = 'block';
        audio.pause();
        isPlaying = false;
        statusMsg.style.display = 'none';
    }

    // --- 4. Click Wheel Mantığı (Dokunmatik/Fare) ---
    let startX, startY;
    let isDragging = false;
    let lastAngle = 0;

    wheel.addEventListener('mousedown', startDrag);
    wheel.addEventListener('touchstart', startDrag, {passive: false});

    window.addEventListener('mousemove', onDrag);
    window.addEventListener('touchmove', onDrag, {passive: false});

    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    function startDrag(e) {
        if(e.target === centerBtn) return; // Orta tuşa basıldıysa wheel dönmesin
        isDragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const rect = wheel.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        lastAngle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
    }

    function onDrag(e) {
        if (!isDragging) return;
        e.preventDefault(); // Sayfa kaydırmayı engelle

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const rect = wheel.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const currentAngle = Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
        let delta = currentAngle - lastAngle;

        // Açısal atlama düzeltmesi (-180/180 geçişi)
        if (delta < -180) delta += 360;
        if (delta > 180) delta -= 360;

        // Hassasiyet ayarı (eşik değer)
        if (Math.abs(delta) > 20) { 
            if (delta > 0) {
                // Saat yönü (İleri)
                changeSelection(1);
            } else {
                // Saat tersi (Geri)
                changeSelection(-1);
            }
            lastAngle = currentAngle; // Sıfırla ki sürekli tetiklenmesin
        }
    }

    function endDrag() {
        isDragging = false;
    }

    function changeSelection(direction) {
        if (playerView.style.display === 'flex') return; // Çalar açıksa liste değiştirmeyi engelle (veya şarkı değiştir mantığı eklenebilir)
        
        let newIndex = currentIndex + direction;
        if (newIndex < 0) newIndex = surahs.length - 1;
        if (newIndex >= surahs.length) newIndex = 0;
        
        currentIndex = newIndex;
        renderList();
    }

    // Orta Tuş (Select)
    centerBtn.addEventListener('click', () => {
        if (playerView.style.display === 'flex') {
            // Eğer çalar açıksa: Duraklat/Oynat
            if (audio.paused) {
                audio.play();
                statusMsg.textContent = "Oynatılıyor";
                statusMsg.style.display = 'none';
                setTimeout(() => statusMsg.style.display = 'none', 1000);
            } else {
                audio.pause();
                statusMsg.textContent = "Duraklatıldı";
                statusMsg.style.display = 'none';
                setTimeout(() => statusMsg.style.display = 'none', 1000);
            }
        } else {
            // Liste açıksa: Seç ve Oynat
            selectSurah(currentIndex);
        }
    });

    
        // --- Menü Tuşu (Ayarlar ve Liste Arası Geçiş) ---
    document.querySelector('.lbl-menu').addEventListener('click', () => {
        // Eğer çalar görünümü açıksa, önce listeye geri dön
        if (playerView.style.display === 'flex') {
            showListView();
            return;
        }

        // Şu an hangi görünüm açık?
        if (listEl.style.display !== 'none') {
            // Liste açıksa -> Ayarları aç
            listEl.style.display = 'none';
            settingsView.style.display = 'flex';
            statusMsg.style.display = 'none';
        } else if (settingsView.style.display !== 'none') {
            // Ayarlar açıksa -> Listeye geri dön
            settingsView.style.display = 'none';
            listEl.style.display = 'block';
            statusMsg.style.display = 'none';
        }
    });

    // --- Tema Değiştirme Butonları ---
    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        
        
        // Kullanıcıya geri bildirim 
        statusMsg.textContent = theme === 'light' ? "Aydınlık Mod" : "Koyu Mod";
        statusMsg.style.display = 'none';
        setTimeout(() => statusMsg.style.display = 'none', 1000);
    }

    btnLight.addEventListener('click', () => setTheme('light'));
    btnDark.addEventListener('click', () => setTheme('dark'));


    // --- Audio Progress Bar ---
    audio.addEventListener('timeupdate', () => {
        if(audio.duration) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = percent + '%';
            
            document.getElementById('curr-time').textContent = formatTime(audio.currentTime);
            document.getElementById('dur-time').textContent = formatTime(audio.duration);
        }
    });

    audio.addEventListener('ended', () => {
        // Sure bitince bir sonraki sureye geç (Otomatik Albüm özelliği)
        let next = currentIndex + 1;
        if(next < surahs.length) {
            selectSurah(next);
        } else {
            statusMsg.textContent = "Süre Tamamlandı";
            statusMsg.style.display = 'block';
        }
    });

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // Başlat
    fetchSurahs();

</script>

</body>
</html>
